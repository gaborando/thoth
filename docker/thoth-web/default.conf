server {
    listen       80;
    server_name  localhost;

    # Pinned self-hosted drawio editor. Served here (same origin as thoth-web)
    # so the embed protocol needs no CORS. Kept above the SPA fallback so a
    # missing drawio asset returns 404 instead of the Angular index.html.
    location /drawio/ {
        root      /usr/share/nginx/html;
        index     index.html;
        try_files $uri $uri/ =404;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html =404;
    }
}
